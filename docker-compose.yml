services:
  server:
    build:
      context: ./Server
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      APP_PASSWORD: ${APP_PASSWORD}
      # nginx leitet /api/* intern weiter; Browser sieht nur Port 80
      ALLOWED_ORIGINS: http://localhost
    volumes:
      # SQLite-Datenbank außerhalb des Containers persistieren
      - db_data:/app/data
    expose:
      - "3001"

  client:
    build:
      context: ./Client
      args:
        # Leer = selbe Origin → nginx proxy, kein CORS-Problem
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      - server

volumes:
  db_data:
